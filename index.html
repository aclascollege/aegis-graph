<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis-Graph | Sovereign Academic Audit Platform</title>
    <!-- REMOVED EXTERNAL FONTS FOR HF SPACE COMPATIBILITY -->
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #03050a;
            --glass: rgba(10, 15, 25, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #ffffff;
            font-family: sans-serif; /* Use system font for max compatibility */
            overflow-x: hidden;
            background-image: url('aegis_graph_sovereign_bg_1777546038401.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.7);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 50px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: var(--primary);
            font-weight: 900;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .cta-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { border: 1px solid var(--primary); color: var(--primary); }

        footer { margin-top: 40px; color: #666; font-size: 0.8rem; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="glass-card">
            <h1>🛡️ Aegis-Graph</h1>
            <p class="subtitle">Sovereign Multi-Agent Protocol for Global Academic Verification. Linking 102,000+ Institutional Trust Nodes.</p>
            
            <div class="cta-group">
                <a href="https://atlanta-college-of-liberal-arts.gitbook.io/atlanta-college-of-liberal-arts-and-sciences" class="btn btn-primary" target="_blank">DOCUMENTATION</a>
                <a href="https://huggingface.co/ACLASCollege/aegis-graph" class="btn btn-secondary" target="_blank">EXPLORE PROTOCOL</a>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Aegis-Graph. Governed by <a href="https://aclas.college/">Atlanta College of Liberal Arts and Sciences (ACLAS)</a></p>
        </footer>
    </div>
</body>
</html>
