<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis-Graph | Atlanta College of Liberal Arts and Sciences (ACLAS)</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0a0e17;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a2a4a 0%, #0a0e17 100%);
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p.subtitle {
            font-size: 1.5rem;
            color: #8892b0;
            max-width: 800px;
            margin: 20px auto;
        }

        .topology-viz {
            width: 100%;
            height: 400px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--primary);
        }

        .node {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(2.5); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        footer {
            padding: 50px;
            text-align: center;
            background: #05070a;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>🛡️ Aegis-Graph</h1>
        <p class="subtitle">Sovereign Academic Audit Network. Verifying 102,000+ real-world nodes.</p>
        <div style="margin-top: 30px;">
            <a href="https://atlanta-college-of-liberal-arts.gitbook.io/atlanta-college-of-liberal-arts-and-sciences" style="background: var(--primary); color: #000; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold;">DOCUMENTATION</a>
        </div>
    </header>

    <div style="padding: 100px 50px; max-width: 1200px; margin: 0 auto; text-align: center;">
        <h2>Global Academic Topology</h2>
        <div class="topology-viz" id="viz"></div>
    </div>

    <footer>
        <p>&copy; 2026 Aegis-Graph Protocol. Governed by Atlanta College of Liberal Arts and Sciences (ACLAS)</p>
    </footer>

    <script>
        const viz = document.getElementById('viz');
        for (let i = 0; i < 20; i++) {
            const node = document.createElement('div');
            node.className = 'node';
            node.style.left = Math.random() * 95 + '%';
            node.style.top = Math.random() * 95 + '%';
            node.style.animationDelay = Math.random() * 2 + 's';
            viz.appendChild(node);
        }
    </script>
</body>
</html>
