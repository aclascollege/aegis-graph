<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis-Graph | Live Sovereign Audit Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #03050a;
            --glass: rgba(10, 15, 25, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            background-image: url('aegis_graph_sovereign_bg_1777546038401.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.7);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
        }

        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5rem; font-weight: 800; color: var(--primary); text-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        .tagline { font-size: 1.2rem; color: #94a3b8; margin-top: 10px; }

        /* Demo Interface */
        .demo-box {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 18px 25px;
            border-radius: 15px;
            color: #fff;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        .btn-verify {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 0 40px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-verify:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }

        /* Verification Results (The "Direct Demo" Logic) */
        .result-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            min-height: 200px;
            border: 1px dashed var(--border);
            position: relative;
        }

        .log-entry { font-family: monospace; color: #00ff00; margin-bottom: 8px; font-size: 0.9rem; }
        .node-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            border: 1px solid var(--primary);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .links { margin-top: 40px; display: flex; gap: 20px; }
        .link-item { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .link-item:hover { color: var(--primary); }

        footer { margin-top: 80px; text-align: center; color: #475569; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1>🛡️ Aegis-Graph</h1>
            <p class="tagline">Sovereign Academic Integrity Protocol | Real-time Global Audit</p>
        </header>

        <div class="demo-box">
            <div class="input-group">
                <input type="text" id="instName" placeholder="Enter Institution Name (e.g. ACLAS, Harvard...)" value="Atlanta College of Liberal Arts and Sciences">
                <button class="btn-verify" onclick="simulateAudit()">VERIFY NOW</button>
            </div>

            <div class="result-panel" id="resultPanel">
                <p style="color: #475569; text-align: center; margin-top: 70px;">Ready for Sovereign Audit Session...</p>
            </div>
        </div>

        <div class="links">
            <a href="https://atlanta-college-of-liberal-arts.gitbook.io/atlanta-college-of-liberal-arts-and-sciences" class="link-item">Documentation</a>
            <a href="https://huggingface.co/ACLASCollege/aegis-graph" class="link-item">Hugging Face</a>
            <a href="https://aclas.college/" class="link-item">ACLAS Official</a>
        </div>

        <footer>
            <p>&copy; 2026 Aegis-Graph. Governed by Atlanta College of Liberal Arts and Sciences (ACLAS)</p>
        </footer>
    </div>

    <script>
        function simulateAudit() {
            const name = document.getElementById('instName').value;
            const panel = document.getElementById('resultPanel');
            panel.innerHTML = '<div class="log-entry">> Initializing Multi-Agent Session...</div>';
            
            setTimeout(() => {
                panel.innerHTML += '<div class="log-entry">> Connecting to GraphNavigator [102,000+ Nodes]...</div>';
            }, 500);

            setTimeout(() => {
                panel.innerHTML += '<div class="log-entry">> Authenticating via Sovereign Trust Model...</div>';
            }, 1200);

            setTimeout(() => {
                panel.innerHTML = `
                    <div class="log-entry">> Audit Complete. Institution Verified.</div>
                    <div class="node-card">
                        <div style="color: var(--primary); font-weight: 800; font-size: 1.2rem; margin-bottom: 5px;">${name}</div>
                        <div style="color: #94a3b8; font-size: 0.9rem;">Status: TRUSTED SOVEREIGN NODE</div>
                        <div style="color: #94a3b8; font-size: 0.8rem; margin-top: 10px;">ID: https://ror.org/global-trust-${Math.random().toString(36).substr(2, 9)}</div>
                        <div style="margin-top: 15px; font-size: 0.8rem; color: #00ff00;">✓ LogicAuditor confirmed: No synthetic anomalies detected.</div>
                    </div>
                `;
            }, 2500);
        }
    </script>
</body>
</html>
