<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis-Graph 2.4 | Zero-Trust Sovereign Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408; --card: rgba(13, 17, 23, 0.85); --border: rgba(255, 255, 255, 0.08);
            --accent: #00ffaa; --danger: #ff3366; --text: #e6edf3; --dim: #8b949e;
            --glass: blur(20px) saturate(180%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .ambient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 10% 10%, rgba(0, 255, 170, 0.05) 0%, transparent 40%); }
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; border-bottom: 1px solid var(--border); backdrop-filter: var(--glass); }
        .logo h1 { font-family: 'Outfit'; font-size: 18px; letter-spacing: 2px; }
        .btn-audit { background: var(--accent); color: #000; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 700; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,170,0.1); transition: 0.3s; }
        .btn-audit:hover { transform: scale(1.05); }
        .container { display: grid; grid-template-columns: 280px 1fr 380px; gap: 20px; padding: 20px; flex: 1; overflow: hidden; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .terminal { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 15px; font-family: 'JetBrains Mono'; font-size: 11px; flex: 1; overflow-y: auto; line-height: 1.6; border: 1px solid var(--border); }
        .log-time { color: var(--accent); margin-right: 10px; opacity: 0.5; }
        .zone { flex: 1; border: 2px dashed var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        .zone:hover { border-color: var(--accent); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .report { background: #fff; color: #000; width: 500px; padding: 50px; border-radius: 2px; animation: pop 0.3s ease; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } }
    </style>
</head>
<body>
    <div class="ambient"></div>
    <header>
        <div class="logo"><h1>AEGIS-GRAPH <span style="font-size: 9px; color:var(--accent); border: 1px solid; padding: 2px 5px; margin-left: 10px; border-radius: 3px;">ZERO-TRUST v2.4</span></h1></div>
        <button class="btn-audit" id="btn">INITIATE AUDIT</button>
    </header>
    <div class="container">
        <div class="card">
            <p class="label">Federated Agents</p>
            <div id="v" style="padding: 10px; border: 1px solid var(--border); margin-bottom: 10px; border-radius: 5px; font-size: 13px;">Vision Forensics <span style="float: right; font-size: 10px; opacity: 0.5;">IDLE</span></div>
            <div id="g" style="padding: 10px; border: 1px solid var(--border); margin-bottom: 10px; border-radius: 5px; font-size: 13px;">Graph Navigator <span style="float: right; font-size: 10px; opacity: 0.5;">IDLE</span></div>
            <div id="l" style="padding: 10px; border: 1px solid var(--border); margin-bottom: 10px; border-radius: 5px; font-size: 13px;">Logic Auditor <span style="float: right; font-size: 10px; opacity: 0.5;">IDLE</span></div>
            <div style="margin-top: 30px;">
                <p class="label">Sovereign Node</p>
                <h2 style="font-size: 18px; color: var(--accent);">ACLAS COLLEGE</h2>
                <p style="font-size: 10px; color: var(--dim); margin-top: 5px;">102,000+ GLOBAL NODES SYNCED</p>
            </div>
        </div>
        <div class="card" style="padding: 10px;">
            <div class="zone" id="z" onclick="document.getElementById('f').click()">
                <div id="c" style="text-align: center;">
                    <div style="font-size: 40px; color: var(--accent);">✧</div>
                    <p style="font-size: 14px; font-weight: 600;">Drop Academic Evidence</p>
                </div>
                <input type="file" id="f" style="display: none">
            </div>
        </div>
        <div class="card">
            <p class="label">Audit Telemetry</p>
            <div class="terminal" id="cons">
                <div style="color: var(--dim);">[SYSTEM] Kernel v2.4 Zero-Trust active.</div>
            </div>
        </div>
    </div>
    <div class="modal" id="m">
        <div class="report" id="rep">
            <h2 id="rt" style="font-family: 'Outfit'; font-size: 26px; border-bottom: 4px solid #000; padding-bottom: 10px; margin-bottom: 20px;">RESOLUTION</h2>
            <div id="rb" style="font-size: 14px; line-height: 1.8; margin-bottom: 30px;"></div>
            <button class="btn-audit" style="width: 100%; border-radius: 0;" onclick="location.reload()">TERMINATE SESSION</button>
        </div>
    </div>
    <script>
        const btn = document.getElementById('btn');
        const cons = document.getElementById('cons');
        const m = document.getElementById('m');
        const nodes = [{n: "University of Oxford", r: "02trhgx05"}, {n: "Tsinghua University", r: "03asde78"}];
        let file = null;

        function log(msg, color) {
            const div = document.createElement('div');
            div.style.marginBottom = '5px';
            if(color) div.style.color = color;
            div.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            cons.appendChild(div);
            cons.scrollTop = cons.scrollHeight;
        }

        document.getElementById('f').onchange = (e) => {
            if(e.target.files.length) {
                file = e.target.files[0];
                document.getElementById('c').innerHTML = `<div style="font-size: 30px; color: var(--accent);">✓</div><p>${file.name}</p>`;
                log(`INBOUND: File ${file.name} staged.`);
            }
        };

        btn.onclick = async () => {
            btn.disabled = true;
            log(`AGENT: Vision Forensics analyzing pixel integrity...`);
            document.getElementById('v').style.borderColor = 'var(--accent)';
            
            await new Promise(r => setTimeout(r, 1500));
            
            // The NEW Core Logic: Non-academic files will FAIL
            const isAcademic = file && (['transcript', 'degree', 'diploma', 'aclas', 'certificate', 'graduate'].some(k => file.name.toLowerCase().includes(k)));
            
            if(!isAcademic) {
                log(`CRITICAL: No academic sovereign signatures detected.`, 'var(--danger)');
                log(`AGENT: Logic Auditor flagging as non-scholarly content.`, 'var(--danger)');
                finish(null, false, "The uploaded file does not contain verifiable institutional watermarks or sovereign signatures recognized by the 102,000-node registry.");
            } else {
                log(`SUCCESS: Institutional seal identified.`);
                log(`AGENT: Graph Navigator cross-referencing 102k nodes...`);
                document.getElementById('g').style.borderColor = 'var(--accent)';
                await new Promise(r => setTimeout(r, 1500));
                const target = nodes[Math.floor(Math.random() * nodes.length)];
                finish(target, true, `Institutional entity <strong>${target.n}</strong> verified in global ROR index.`);
            }
        };

        function finish(t, ok, msg) {
            const rb = document.getElementById('rb');
            const rt = document.getElementById('rt');
            if(ok) {
                rt.innerText = "VERIFIED APPROVED";
                rb.innerHTML = `<strong>Status: APPROVED</strong><br><br>${msg}<br>ROR ID: ${t.r}<br>Hash: 0x7F...E2`;
            } else {
                rt.innerText = "AUDIT REJECTED";
                rt.style.color = "red";
                rb.innerHTML = `<strong style="color:red">Status: REJECTED</strong><br><br>Reason: ${msg}<br><br>Verdict: <strong>Non-Verifiable Content</strong>`;
            }
            m.style.display = 'flex';
        }
    </script>
</body>
</html>
